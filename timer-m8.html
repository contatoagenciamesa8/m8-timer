<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M8 Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #181818;
    --border: #2a2a2a;
    --accent: #f5c518;
    --text: #f0f0f0;
    --muted: #555;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(245,197,24,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.4em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
  }
  .card + .card { margin-top: 12px; }
  .card-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  select, input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    border-radius: 8px;
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  select:focus, input[type="text"]:focus { border-color: var(--accent); }
  select option { background: #1a1a1a; }
  .timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 0 20px;
  }
  .ring {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 20px;
  }
  .ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 3; }
  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 440;
    stroke-dashoffset: 440;
    transition: stroke-dashoffset 1s linear;
  }
  .ring-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .time-value {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .time-value.running { color: var(--accent); }
  .time-label {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-start { background: var(--accent); color: #000; }
  .btn-start:hover { background: #ffd83d; transform: translateY(-1px); }
  .btn-stop { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-stop:hover { background: rgba(239,68,68,0.08); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .pulse {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }
  .log-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-name { font-size: 12px; font-weight: 700; }
  .log-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .log-time { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 700; margin-left: 10px; flex-shrink: 0; }
  .log-status { font-size: 11px; margin-left: 6px; flex-shrink: 0; }
  .ok { color: var(--green); }
  .err { color: var(--red); }
  .saving { color: var(--muted); }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 16px 0; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 11px 20px;
    border-radius: 10px;
    font-size: 13px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="logo">⏱ M8 Timer</div>

<div class="card">
  <div class="card-title">Nova sessão</div>

  <select id="cliente">
    <option value="">Selecione o cliente...</option>
    <option value="American Burguer">🍔 American Burguer</option>
    <option value="Barbearia Igor">💈 Barbearia Igor</option>
    <option value="Borda Brasileira PT">🍕 Borda Brasileira PT</option>
    <option value="Brazilian Burger House">🍔 Brazilian Burger House</option>
    <option value="Hc Burguer">🍔 Hc Burguer</option>
    <option value="No Japa Sushi">🍣 No Japa Sushi</option>
    <option value="Pirapizza">🍕 Pirapizza</option>
    <option value="Pizzaria Pachecco">🍕 Pizzaria Pachecco</option>
    <option value="Pizzaria Sabor Brasileiro">🍕 Pizzaria Sabor Brasileiro</option>
    <option value="Rei do Barbecue">🥩 Rei do Barbecue</option>
    <option value="Sampa Smash">🍔 Sampa Smash</option>
  </select>

  <select id="servico">
    <option value="">Selecione o tipo de serviço...</option>
    <option value="Meta Ads">📣 Meta Ads</option>
    <option value="Edição de Vídeo">🎬 Edição de Vídeo</option>
    <option value="Análise / Relatório">📊 Análise / Relatório</option>
    <option value="Conteúdo / Posts">📸 Conteúdo / Posts</option>
  </select>

  <input type="text" id="demanda" placeholder="Descreva a demanda..." />

  <div class="timer-wrap">
    <div class="ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="70"/>
        <circle class="ring-progress" id="ringProgress" cx="80" cy="80" r="70"/>
      </svg>
      <div class="ring-center">
        <div class="time-value" id="timeDisplay">00:00:00</div>
        <div class="time-label" id="timeLabel">pronto</div>
      </div>
    </div>
    <button class="btn btn-start" id="mainBtn" onclick="toggleTimer()">▶ Iniciar</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Sessões registradas</div>
  <div id="logList"><div class="empty">Nenhuma sessão ainda</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzkrS5rhhR_vABo_5UYw-z-i52P25yD2OXG6_RUKJS0tP9NoGVifFhj6CTvcuJBMRTbGw/exec';

  let running = false;
  let startTime = null;
  let timerInterval = null;
  let sessions = [];

  function toggleTimer() {
    if (!running) startTimer();
    else stopTimer();
  }

  function startTimer() {
    const cliente = document.getElementById('cliente').value;
    const servico = document.getElementById('servico').value;
    const demanda = document.getElementById('demanda').value.trim();
    if (!cliente || !servico || !demanda) { showToast('Preencha todos os campos', 'error'); return; }

    running = true;
    startTime = Date.now();

    document.getElementById('timeDisplay').classList.add('running');
    document.getElementById('timeLabel').textContent = 'em andamento';
    document.getElementById('mainBtn').className = 'btn btn-stop';
    document.getElementById('mainBtn').innerHTML = '<span class="pulse"></span> Parar e salvar';
    document.getElementById('cliente').disabled = true;
    document.getElementById('servico').disabled = true;
    document.getElementById('demanda').disabled = true;
    timerInterval = setInterval(updateDisplay, 1000);
  }

  async function stopTimer() {
    running = false;
    clearInterval(timerInterval);

    const totalSeconds = Math.floor((Date.now() - startTime) / 1000);
    const cliente = document.getElementById('cliente').value;
    const servico = document.getElementById('servico').value;
    const demanda = document.getElementById('demanda').value.trim();
    const minutes = Math.round(totalSeconds / 60) || 1;

    document.getElementById('timeDisplay').classList.remove('running');
    document.getElementById('timeLabel').textContent = 'salvando...';
    document.getElementById('mainBtn').disabled = true;

    const session = { cliente, servico, demanda, seconds: totalSeconds, status: 'saving' };
    sessions.unshift(session);
    renderLog();

    const saved = await saveToSheets(cliente, servico, demanda, minutes);
    session.status = saved ? 'ok' : 'error';
    renderLog();

    document.getElementById('timeDisplay').textContent = '00:00:00';
    document.getElementById('timeLabel').textContent = 'pronto';
    document.getElementById('ringProgress').style.strokeDashoffset = 440;
    document.getElementById('mainBtn').className = 'btn btn-start';
    document.getElementById('mainBtn').innerHTML = '▶ Iniciar';
    document.getElementById('mainBtn').disabled = false;
    document.getElementById('cliente').disabled = false;
    document.getElementById('servico').disabled = false;
    document.getElementById('demanda').disabled = false;
    document.getElementById('demanda').value = '';

    showToast(saved ? '✅ Salvo no Google Sheets!' : '⚠️ Erro ao salvar', saved ? 'success' : 'error');
  }

  function updateDisplay() {
    const total = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timeDisplay').textContent = formatTime(total);
    document.getElementById('ringProgress').style.strokeDashoffset = 440 - (440 * (total % 60) / 60);
  }

  async function saveToSheets(cliente, servico, demanda, minutes) {
    const today = new Date().toLocaleDateString('pt-BR');
    const url = `${SCRIPT_URL}?data=${encodeURIComponent(today)}&cliente=${encodeURIComponent(cliente)}&servico=${encodeURIComponent(servico)}&demanda=${encodeURIComponent(demanda)}&minutos=${minutes}`;
    try {
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      return true;
    } catch(e) {
      return false;
    }
  }

  function renderLog() {
    const el = document.getElementById('logList');
    if (!sessions.length) { el.innerHTML = '<div class="empty">Nenhuma sessão ainda</div>'; return; }
    el.innerHTML = sessions.map(s => `
      <div class="log-item">
        <div style="flex:1;overflow:hidden">
          <div class="log-name">${s.demanda}</div>
          <div class="log-meta">${s.cliente} · ${s.servico}</div>
        </div>
        <div class="log-time">${formatTime(s.seconds)}</div>
        <div class="log-status ${s.status}">${s.status==='ok'?'✓':s.status==='error'?'✗':'...'}</div>
      </div>`).join('');
  }

  function formatTime(s) {
    return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;
  }

  function pad(n) { return String(n).padStart(2,'0'); }

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
